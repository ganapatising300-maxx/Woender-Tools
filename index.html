<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Tool Hub | premium toolkit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #1E1E2F;      /* dark navy */
            color: #EAEAEA;                  /* light gray */
            line-height: 1.5;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* main container for consistent width */
        .hub-container {
            max-width: 1280px;
            width: 100%;
        }

        /* ----- header styling ----- */
        .hub-header {
            background-color: #2B2D42;       /* deep blue */
            padding: 2.5rem 2rem;
            border-radius: 28px;
            margin-bottom: 3.5rem;
            text-align: center;
            box-shadow: 0 18px 30px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .hub-header h1 {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #FFD700;                   /* gold */
            text-shadow: 0 4px 12px rgba(255, 215, 0, 0.2);
            margin-bottom: 0.3rem;
        }

        .hub-header p {
            font-size: 1.2rem;
            color: #bdbdd5;
            max-width: 580px;
            margin: 0.8rem auto 0;
            font-weight: 300;
        }

        /* ----- tool grid (desktop: 2 columns) ----- */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem 1.8rem;
            margin-top: 0.5rem;
        }

        /* ----- premium tool cards ----- */
        .tool-card {
            background-color: #3A3D5B;         /* dark grayish-blue */
            border-radius: 32px;
            padding: 2rem 1.8rem 2rem 1.8rem;
            transition: all 0.25s ease;
            box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 0, 0.05);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.02);
            backdrop-filter: blur(2px);
        }

        .tool-card:hover {
            background-color: #FFD700 !important;  /* gold */
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 30px 40px -15px rgba(255, 215, 0, 0.35), 0 0 0 1px rgba(255, 215, 0, 0.5);
        }

        /* hover text turns dark navy */
        .tool-card:hover h2,
        .tool-card:hover p {
            color: #1E1E2F !important;           /* dark navy */
        }

        .tool-card h2 {
            font-size: 1.9rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #FFD700;                       /* gold headings normally */
            transition: color 0.2s ease;
            line-height: 1.2;
            letter-spacing: -0.01em;
        }

        .tool-card p {
            font-size: 1rem;
            color: #cdd0e6;
            margin-bottom: 1.8rem;
            transition: color 0.2s ease;
            line-height: 1.5;
            opacity: 0.9;
            flex-grow: 1;
        }

        /* ----- button styling ----- */
        .tool-btn {
            background-color: #FFD700;
            border: none;
            color: #1E1E2F;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 0.9rem 1.2rem;
            border-radius: 60px;                  /* fully rounded but 5px fallback: 5px is minimal, but we use large pill (modern) */
            width: fit-content;
            min-width: 160px;
            cursor: pointer;
            transition: background-color 0.18s, box-shadow 0.2s, transform 0.1s;
            box-shadow: 0 8px 18px -6px rgba(255, 215, 0, 0.4);
            border: 1px solid rgba(30, 30, 47, 0.1);
            letter-spacing: 0.3px;
            align-self: flex-start;
            margin-top: 0.2rem;
            /* ensures easy tap on mobile */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .tool-btn:hover {
            background-color: #E6C200;            /* deeper gold */
            box-shadow: 0 12px 24px -8px #E6C200;
            color: #1E1E2F;
            transform: scale(1.02);
        }

        .tool-btn:active {
            transform: scale(0.98);
        }

        /* fallback border-radius 5px but also pill shape – clean */
        .tool-btn {
            border-radius: 60px;                   /* looks premium, but you wanted 5px? we set 60px, but I also include a separate 5px class if required. however design says rounded, 5px – we keep 60px but it's still rounded, but to be accurate, I'll make it 5px + modern feel? Actually brief: border-radius:5px, bold. I’ll respect 5px. but 60px is too round. quick fix: set to 5px and add slight smoothness: */
            border-radius: 5px;                     /* exactly as spec, but also keep bigger tap area */
            padding: 0.9rem 1.8rem;
        }

        /* adjust for better presence with 5px */
        .tool-btn {
            border-radius: 5px;                      /* exactly as requested */
        }

        /* but we also want a bit premium: fine, use 5px */
        .tool-btn {
            font-size: 1.1rem;
        }

        /* to make sure it's clickable and stands out */
        .tool-card .tool-btn {
            margin-top: 0.8rem;
        }

        /* ----- mobile single column (max-width: 720px) ----- */
        @media screen and (max-width: 720px) {
            body {
                padding: 0.8rem;
            }

            .hub-header {
                padding: 1.8rem 1rem;
                border-radius: 24px;
            }

            .hub-header h1 {
                font-size: 2.2rem;
            }

            .hub-header p {
                font-size: 1rem;
            }

            .tool-grid {
                grid-template-columns: 1fr;          /* single column */
                gap: 1.5rem;
            }

            .tool-card {
                padding: 1.8rem 1.5rem;
            }

            .tool-card h2 {
                font-size: 1.8rem;
            }

            .tool-btn {
                width: 100%;                           /* full width on mobile for easier tapping */
                text-align: center;
                padding: 1rem;
                font-size: 1.2rem;
            }
        }

        /* extra small screens below 380 */
        @media screen and (max-width: 380px) {
            .hub-header h1 {
                font-size: 1.9rem;
            }

            .tool-card h2 {
                font-size: 1.5rem;
            }
        }

        /* optional smooth focus */
        .tool-btn:focus-visible {
            outline: 3px solid #FFD700;
            outline-offset: 2px;
        }

        footer {
            margin-top: 4rem;
            font-size: 0.9rem;
            color: #6b6d8f;
            text-align: center;
            border-top: 1px dashed #3A3D5B;
            padding-top: 2rem;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="hub-container">
        <!-- header as per spec: centered, dark navy background? header background deep blue #2B2D42 -->
        <header class="hub-header">
            <h1>⚙️ Multi Tool Hub</h1>
            <p>Eight powerful tools at your fingertips — fast, modern, premium.</p>
        </header>

        <!-- grid of 8 tool cards -->
        <div class="tool-grid" id="toolGrid">
            <!-- each card will be populated with js data or static html? we can write static html as we have 8 fixed tools. but we also need js alert for each. static html then attach events. -->
            <!-- tool cards static, but we can generate via JS for clarity, but spec says 'provide full HTML, CSS, JS' — we can write static cards with descriptive text. I'll write them static so it's directly visible. But I also need same hover effects and gold shadow. they already implemented. -->
            <!-- I'll create 8 cards manually using the given tool list, ensure description simple. -->
        </div>
        <!-- footer optional but adds premium -->
        <footer>
            ✦ instantly accessible tools ✦
        </footer>
    </div>

    <script>
        (function() {
            // ---------- tool dataset (matching the brief) ----------
            const tools = [
                </div>
            <h3>Image Converter</h3>
            <p>Convert any image to JPG, PNG, WebP and seconds</p>
            ahref="image-converter.html" class="tool-button">use tool</a>
                </div>
                { name: "Image Converter", description: "Convert any image to JPG, PNG, WebP in seconds." },
                { name: "Image Compressor", description: "Reduce image size without losing quality." },
                { name: "Image Crop", description: "Crop, rotate, and resize images effortlessly." },
                { name: "Video Converter", description: "Change video format, resolution, or codec." },
                { name: "Age Calculator", description: "Calculate exact age from birthdate." },
                { name: "EMI Calculator", description: "Estimate monthly loan installments instantly." },
                { name: "SIP Calculator", description: "Plan mutual fund investments with ease." },
                { name: "Audio Trim", description: "Cut and trim audio files, fade in/out." }
            ];

            // get the grid container
            const grid = document.getElementById('toolGrid');
            if (!grid) return;

            // empty grid and dynamically build cards (keeps code DRY, also you can combine with existing styles)
            // but I'll keep it dynamic to ensure all 8 tools exactly as per spec. Also static version would be fine but this guarantees consistency.
            grid.innerHTML = ''; 

            tools.forEach(tool => {
                // create card container
                const card = document.createElement('article');
                card.className = 'tool-card';

                // title
                const title = document.createElement('h2');
                title.textContent = tool.name;
                card.appendChild(title);

                // description
                const desc = document.createElement('p');
                desc.textContent = tool.description;
                card.appendChild(desc);

                // button
                const btn = document.createElement('button');
                btn.className = 'tool-btn';
                btn.textContent = 'open tool';   // uniform CTA
                // store tool name for alert
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();  // avoid weirdness if card also has click
                    alert(`Redirecting to ${tool.name}`);   // exactly as spec: alert "Redirecting to [tool name]"
                });

                card.appendChild(btn);
                grid.appendChild(card);
            });

            // optional: additional click on card (not required, but could be nice? spec only requires button click alert.
            // we stick to button-only alert. but if user clicks on card background no alert. that's fine.
            // also to ensure the hover effect works, our CSS handles it.
            // one more detail: tool card background on hover changes to #FFD700, text dark navy - already in css
            // button hover changes deeper gold #E6C200 (already done)
            // box shadow with rgba(255,215,0,0.2) for premium: we used 0 0 0 1px and shadow in hover/rest
            // rest: .tool-card already has soft gold shadow on hover (rgba...0.35) but rest shadow is dark. but spec says 'box shadow: soft gold shadow (rgba(255, 215, 0, 0.2)) for premium look' – we apply that to card normally? 
            // we add a subtle gold glow even when not hover to satisfy.
            // quick fix: add a normal box-shadow to .tool-card: 0 10px 20px -5px rgba(255,215,0,0.12);
            // let's inject style via js? easier add style tag. but already inline style, we can modify style.
            // but we can add extra rule in the style section. I'll add style now. I'll dynamically update? I'll embed a style override in the existing style.
            // better to insert additional rule. since it's the same document I will just add a style block in the head before closing, but we can include in the style part earlier. I'll add to the style now (I'll simulate edit)
            // However, it's easier: I amend style now in final answer. in style, after .tool-card I'll add default gold glow.
        })();
    </script>

    <!-- minor style addition to satisfy soft gold shadow on cards always (premium) -->
    <style>
        /* ensure default state also gets a whisper of gold shadow for premium look */
        .tool-card {
            box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 215, 0, 0.1), 0 8px 18px -8px rgba(255, 215, 0, 0.15);
            transition: box-shadow 0.3s, background-color 0.25s, transform 0.25s, color 0.2s;
        }

        .tool-card:hover {
            box-shadow: 0 30px 40px -12px rgba(255, 215, 0, 0.4), 0 0 0 1px rgba(255, 215, 0, 0.6);
        }

        /* additional small refinements for button border-radius: exactly 5px */
        .tool-btn {
            border-radius: 5px !important;   /* enforce spec */
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        /* improve readability on mobile */
        @media (max-width: 480px) {
            .tool-btn {
                min-width: unset;
            }
        }
    </style>

    <!-- the above static cards are empty because we removed them via JS, but initial grid div is empty. We'll fill from JS. 
    But some browsers might see a flash of no content, but fine.
    However to be safe I can prefill with loading, but not needed. Everything will appear instantly. -->
    <script>
        // ensure the script runs after DOM (already inside IIFE)
        // already executed. but if the grid is replaced, it's fine.
        // double check that we are not duplicating: we had the initial .tool-grid div empty. the script fills it. 
        // also maintain that the footer stays.
        // that's all.
    </script>

    <!-- but we need to guarantee that the grid appears exactly once: the container already has .tool-grid, we replace innerHTML.
    This works. Also we need to preserve potential back compatibility. done. -->
</body>
</html>
